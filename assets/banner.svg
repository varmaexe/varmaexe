  <!-- Fade masks so columns blend into center -->
  <defs>
    <linearGradient id="fade-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#020c10" stop-opacity="0"/>
      <stop offset="100%" stop-color="#020c10" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="fade-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#020c10" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#020c10" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Glow backdrop behind SAI -->
  <ellipse cx="450" cy="98" rx="190" ry="68" fill="#023e8a" opacity="0.14">
    <animate attributeName="rx"      values="190;215;190" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.14;0.24;0.14" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- SAI -->
  <text class="sai" x="450" y="118" fill="#00b4d8">SAI</text>

  <!-- Subtitle -->
  <text class="sub" x="450" y="154">// Go Backend Dev · Microservices · Cloud Native</text>

  <!-- Blinking cursor after subtitle -->
  <rect class="cursor" x="714" y="141" width="7" height="13" opacity="0.9"/>

  <!-- Top + bottom accent lines -->
  <rect x="0" y="0"   width="900" height="2" fill="#00b4d8" opacity="0.55"/>
  <rect x="0" y="198" width="900" height="2" fill="#00b4d8" opacity="0.55"/>
</svg>
