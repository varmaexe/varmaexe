<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fall {
        0%   { transform: translateY(-220px); opacity: 0; }
        8%   { opacity: 0.55; }
        88%  { opacity: 0.3; }
        100% { transform: translateY(220px); opacity: 0; }
      }
      @keyframes glow-pulse {
        0%, 100% {
          filter: drop-shadow(0 0 6px #00b4d8) drop-shadow(0 0 14px #023e8a);
          fill: #00b4d8;
        }
        50% {
          filter: drop-shadow(0 0 18px #00fff5) drop-shadow(0 0 36px #00b4d8);
          fill: #00fff5;
        }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
      @keyframes fade-up {
        from { transform: translateY(10px); opacity: 0; }
        to   { transform: translateY(0);    opacity: 0.85; }
      }
      @keyframes bg-shift {
        0%, 100% { stop-color: #020c10; }
        50%      { stop-color: #021a2e; }
      }
      @keyframes glow-expand {
        0%, 100% { rx: 190; opacity: 0.12; }
        50%      { rx: 220; opacity: 0.22; }
      }

      .col {
        font-family: 'Courier New', Courier, monospace;
        font-size: 11px;
        fill: #00b4d8;
        opacity: 0.14;
        animation: fall linear infinite;
      }
      .sai {
        font-family: 'Courier New', Courier, monospace;
        font-weight: bold;
        font-size: 88px;
        letter-spacing: 14px;
        text-anchor: middle;
        animation: glow-pulse 3s ease-in-out infinite;
      }
      .sub {
        font-family: 'Courier New', Courier, monospace;
        font-size: 12px;
        letter-spacing: 2.5px;
        text-anchor: middle;
        fill: #00fff5;
        animation: fade-up 0.8s 0.3s ease both;
      }
      .cursor {
        fill: #00b4d8;
        animation: blink 1.1s step-end infinite;
      }
    </style>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#020c10">
        <animate attributeName="stop-color" values="#020c10;#021a2e;#020c10" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%"  stop-color="#021520"/>
      <stop offset="100%" stop-color="#020c10">
        <animate attributeName="stop-color" values="#020c10;#023050;#020c10" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <clipPath id="clip"><rect width="900" height="200"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- Matrix columns — left wing (x 10–175) -->
  <g clip-path="url(#clip)">
    <text class="col" x="10"  style="animation-duration:2.9s;animation-delay:0.0s">0<tspan x="10"  dy="13">1</tspan><tspan x="10"  dy="13">G</tspan><tspan x="10"  dy="13">O</tspan><tspan x="10"  dy="13">0</tspan><tspan x="10"  dy="13">1</tspan><tspan x="10"  dy="13">1</tspan><tspan x="10"  dy="13">0</tspan><tspan x="10"  dy="13">G</tspan><tspan x="10"  dy="13">O</tspan><tspan x="10"  dy="13">0</tspan><tspan x="10"  dy="13">1</tspan><tspan x="10"  dy="13">1</tspan><tspan x="10"  dy="13">0</tspan><tspan x="10"  dy="13">0</tspan><tspan x="10"  dy="13">1</tspan></text>
