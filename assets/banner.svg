<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 300" width="860" height="300">
  <defs>
    <style>
      @keyframes flicker{0%,89%,100%{opacity:1}90%{opacity:.3}91%{opacity:1}96%{opacity:1}97%{opacity:.2}98%{opacity:1}}
      @keyframes scanmove{0%{transform:translateY(-40px)}100%{transform:translateY(340px)}}
      @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
      @keyframes glowPulse{0%,100%{filter:drop-shadow(0 0 8px #7c3aed) drop-shadow(0 0 2px #a78bfa)}50%{filter:drop-shadow(0 0 22px #a78bfa) drop-shadow(0 0 44px #7c3aed)}}
      @keyframes appear{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
      @keyframes shimmer{0%{transform:translateX(-900px)}100%{transform:translateX(900px)}}
      @keyframes dotPulse{0%,100%{r:2.5}50%{r:4.5}}
      .name-glow{animation:glowPulse 3s ease-in-out infinite,flicker 7s infinite}
      .scan{animation:scanmove 5s linear infinite}
      .bp{animation:pulse 2.5s ease-in-out infinite}
      .sub-appear{animation:appear .6s ease-out .4s both}
      .shim{animation:shimmer 6s linear infinite;opacity:.025}
      .dp1{animation:dotPulse 1.5s ease-in-out infinite}
      .dp2{animation:dotPulse 1.5s ease-in-out .3s infinite}
      .dp3{animation:dotPulse 1.5s ease-in-out .6s infinite}
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030008"/>
      <stop offset="40%" stop-color="#0e0030"/>
      <stop offset="100%" stop-color="#030008"/>
    </linearGradient>
    <linearGradient id="hborder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#030008" stop-opacity="0"/>
      <stop offset="25%" stop-color="#6d28d9" stop-opacity=".8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="75%" stop-color="#6d28d9" stop-opacity=".8"/>
      <stop offset="100%" stop-color="#030008" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="b1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4c1d95"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="b2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4c1d95"/><stop offset="100%" stop-color="#818cf8"/></linearGradient>
    <linearGradient id="b3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4c1d95"/><stop offset="100%" stop-color="#c084fc"/></linearGradient>
    <linearGradient id="b4" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#2e1065"/><stop offset="100%" stop-color="#6d28d9"/></linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#3b0764" stroke-width=".4" opacity=".5"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg2"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="860" height="300" fill="url(#bg)"/>
  <rect width="860" height="300" fill="url(#grid)"/>
  <rect class="scan" x="0" y="0" width="860" height="60" fill="url(#sg)" opacity=".04"/>
  <rect class="shim" x="0" y="0" width="160" height="300" fill="url(#sg)"/>

  <!-- borders -->
  <rect x="0" y="0" width="860" height="2.5" fill="url(#hborder)" class="bp"/>
  <rect x="0" y="297.5" width="860" height="2.5" fill="url(#hborder)" class="bp"/>
  <rect x="0" y="0" width="2" height="300" fill="#3b0764" opacity=".7"/>
  <rect x="858" y="0" width="2" height="300" fill="#3b0764" opacity=".7"/>

  <!-- corners -->
  <polyline points="8,36 8,8 36,8" fill="none" stroke="#a78bfa" stroke-width="2" class="bp"/>
  <polyline points="852,36 852,8 824,8" fill="none" stroke="#a78bfa" stroke-width="2" class="bp"/>
  <polyline points="8,264 8,292 36,292" fill="none" stroke="#a78bfa" stroke-width="2" class="bp"/>
  <polyline points="852,264 852,292 824,292" fill="none" stroke="#a78bfa" stroke-width="2" class="bp"/>
  <line x1="44" y1="8" x2="58" y2="8" stroke="#4c1d95" stroke-width="1" opacity=".5"/>
  <line x1="802" y1="8" x2="816" y2="8" stroke="#4c1d95" stroke-width="1" opacity=".5"/>
  <line x1="44" y1="292" x2="58" y2="292" stroke="#4c1d95" stroke-width="1" opacity=".5"/>
  <line x1="802" y1="292" x2="816" y2="292" stroke="#4c1d95" stroke-width="1" opacity=".5"/>

  <!-- system tag -->
  <rect x="16" y="14" width="100" height="22" rx="2" fill="#0d0025" stroke="#6d28d9" stroke-width="1"/>
  <text x="66" y="29" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa" font-weight="bold" letter-spacing="2">◈ SYSTEM</text>

  <!-- dots -->
  <circle class="dp1" cx="820" cy="23" r="2.5" fill="#7c3aed"/>
  <circle class="dp2" cx="833" cy="23" r="2.5" fill="#6d28d9"/>
  <circle class="dp3" cx="846" cy="23" r="2.5" fill="#4c1d95"/>

  <!-- dividers -->
  <line x1="20" y1="48" x2="840" y2="48" stroke="#2e1065" stroke-width=".5"/>
  <line x1="20" y1="212" x2="840" y2="212" stroke="#2e1065" stroke-width=".5"/>
  <rect x="0" y="48" width="2.5" height="164" fill="#6d28d9" opacity=".5" class="bp"/>
  <rect x="857.5" y="48" width="2.5" height="164" fill="#6d28d9" opacity=".5" class="bp"/>

  <!-- ══ LEFT PANEL ══ -->
  <rect x="18" y="56" width="174" height="148" rx="3" fill="#07001a" stroke="#2e1065" stroke-width="1"/>
  <text x="105" y="73" text-anchor="middle" font-family="monospace" font-size="9" fill="#4c1d95" letter-spacing="2">◈ HUNTER INFO</text>
  <line x1="26" y1="77" x2="184" y2="77" stroke="#1e0040" stroke-width=".5"/>

  <text x="28" y="93" font-family="monospace" font-size="8" fill="#4c1d95" letter-spacing="1">NAME</text>
  <text x="28" y="105" font-family="monospace" font-size="10" fill="#c4b5fd" font-weight="bold">Sai Varma</text>

  <text x="28" y="119" font-family="monospace" font-size="8" fill="#4c1d95" letter-spacing="1">RANK</text>
  <rect x="28" y="122" width="60" height="14" rx="2" fill="#2e1065"/>
  <text x="58" y="132.5" text-anchor="middle" font-family="monospace" font-size="9" fill="#a78bfa" font-weight="bold" letter-spacing="1">S-CLASS</text>

  <text x="28" y="148" font-family="monospace" font-size="8" fill="#4c1d95" letter-spacing="1">LOCATION</text>
  <text x="28" y="160" font-family="monospace" font-size="9" fill="#c4b5fd">Hyderabad, India 🇮🇳</text>

  <text x="28" y="174" font-family="monospace" font-size="8" fill="#4c1d95" letter-spacing="1">GUILD</text>
  <text x="28" y="186" font-family="monospace" font-size="9" fill="#c4b5fd">Indiana Univ · IN-POLIS</text>

  <!-- ══ NAME ══ -->
  <text x="432" y="148" text-anchor="middle" font-family="monospace" font-size="100" font-weight="900" fill="#3b0764" letter-spacing="20" opacity=".5">SAI</text>
  <text class="name-glow" x="430" y="145" text-anchor="middle" font-family="monospace" font-size="100" font-weight="900" fill="#a78bfa" letter-spacing="20" filter="url(#glow)">SAI</text>

  <text class="sub-appear" x="430" y="172" text-anchor="middle" font-family="monospace" font-size="11" fill="#6d28d9" letter-spacing="3">▸ GO BACKEND DEV  ///  MICROSERVICES  ///  CLOUD NATIVE ◂</text>

  <!-- ══ RIGHT PANEL ══ -->
  <rect x="668" y="56" width="174" height="148" rx="3" fill="#07001a" stroke="#2e1065" stroke-width="1"/>
  <text x="755" y="73" text-anchor="middle" font-family="monospace" font-size="9" fill="#4c1d95" letter-spacing="2">◈ SKILL STATS</text>
  <line x1="676" y1="77" x2="834" y2="77" stroke="#1e0040" stroke-width=".5"/>

  <!-- skill bars -->
  <text x="678" y="93" font-family="monospace" font-size="8" fill="#6d28d9">Go / Gin</text>
  <text x="834" y="93" text-anchor="end" font-family="monospace" font-size="8" fill="#a78bfa">92%</text>
  <rect x="678" y="96" width="152" height="5" rx="2" fill="#1e0040"/>
  <rect x="678" y="96" width="140" height="5" rx="2" fill="url(#b1)"/>

  <text x="678" y="112" font-family="monospace" font-size="8" fill="#6d28d9">SQL / GORM</text>
  <text x="834" y="112" text-anchor="end" font-family="monospace" font-size="8" fill="#a78bfa">88%</text>
  <rect x="678" y="115" width="152" height="5" rx="2" fill="#1e0040"/>
  <rect x="678" y="115" width="134" height="5" rx="2" fill="url(#b2)"/>

  <text x="678" y="131" font-family="monospace" font-size="8" fill="#6d28d9">Microservices</text>
  <text x="834" y="131" text-anchor="end" font-family="monospace" font-size="8" fill="#a78bfa">90%</text>
  <rect x="678" y="134" width="152" height="5" rx="2" fill="#1e0040"/>
  <rect x="678" y="134" width="137" height="5" rx="2" fill="url(#b3)"/>

  <text x="678" y="150" font-family="monospace" font-size="8" fill="#6d28d9">Docker</text>
  <text x="834" y="150" text-anchor="end" font-family="monospace" font-size="8" fill="#a78bfa">65%</text>
  <rect x="678" y="153" width="152" height="5" rx="2" fill="#1e0040"/>
  <rect x="678" y="153" width="99" height="5" rx="2" fill="url(#b4)"/>

  <text x="678" y="169" font-family="monospace" font-size="8" fill="#6d28d9">Kubernetes</text>
  <text x="834" y="169" text-anchor="end" font-family="monospace" font-size="8" fill="#a78bfa">45%</text>
  <rect x="678" y="172" width="152" height="5" rx="2" fill="#1e0040"/>
  <rect x="678" y="172" width="68" height="5" rx="2" fill="url(#b4)"/>

  <text x="678" y="188" font-family="monospace" font-size="8" fill="#6d28d9">Next.js</text>
  <text x="834" y="188" text-anchor="end" font-family="monospace" font-size="8" fill="#a78bfa">35%</text>
  <rect x="678" y="191" width="152" height="5" rx="2" fill="#1e0040"/>
  <rect x="678" y="191" width="53" height="5" rx="2" fill="url(#b4)"/>

  <!-- ══ STATUS BAR ══ -->
  <rect x="18" y="220" width="824" height="26" rx="3" fill="#07001a" stroke="#2e1065" stroke-width="1"/>
  <circle class="dp1" cx="35" cy="233" r="4" fill="#4ade80"/>
  <text x="46" y="237" font-family="monospace" font-size="8.5" fill="#4c1d95" letter-spacing="1">STATUS:</text>
  <text x="98" y="237" font-family="monospace" font-size="8.5" fill="#a78bfa" font-weight="bold">ONLINE</text>
  <text x="152" y="237" font-family="monospace" font-size="8.5" fill="#2e1065">|</text>
  <text x="162" y="237" font-family="monospace" font-size="8.5" fill="#4c1d95">WEAPON:</text>
  <text x="214" y="237" font-family="monospace" font-size="8.5" fill="#a78bfa">Go + Microservices</text>
  <text x="358" y="237" font-family="monospace" font-size="8.5" fill="#2e1065">|</text>
  <text x="368" y="237" font-family="monospace" font-size="8.5" fill="#4c1d95">TRAINING:</text>
  <text x="426" y="237" font-family="monospace" font-size="8.5" fill="#a78bfa">K8s · Docker · Next.js</text>
  <text x="566" y="237" font-family="monospace" font-size="8.5" fill="#2e1065">|</text>
  <text x="576" y="237" font-family="monospace" font-size="8.5" fill="#4c1d95">SHADOW ARMY:</text>
  <text x="662" y="237" font-family="monospace" font-size="8.5" fill="#a78bfa">fitness-coach CLI</text>

  <!-- bottom text -->
  <text x="430" y="270" text-anchor="middle" font-family="monospace" font-size="10" fill="#2e1065" letter-spacing="4" class="bp">[ ARISE AND CONQUER THE DUNGEON ]</text>

  <!-- bottom dots -->
  <circle class="dp1" cx="190" cy="283" r="2" fill="#2e1065"/>
  <circle class="dp2" cx="204" cy="283" r="2" fill="#2e1065"/>
  <circle class="dp3" cx="218" cy="283" r="2" fill="#2e1065"/>
  <circle class="dp1" cx="642" cy="283" r="2" fill="#2e1065"/>
  <circle class="dp2" cx="656" cy="283" r="2" fill="#2e1065"/>
  <circle class="dp3" cx="670" cy="283" r="2" fill="#2e1065"/>
</svg>
