    <text class="col" x="136" style="animation-duration:2.5s;animation-delay:1.8s">0<tspan x="136" dy="13">1</tspan><tspan x="136" dy="13">M</tspan><tspan x="136" dy="13">S</tspan><tspan x="136" dy="13">0</tspan><tspan x="136" dy="13">1</tspan><tspan x="136" dy="13">M</tspan><tspan x="136" dy="13">S</tspan><tspan x="136" dy="13">0</tspan><tspan x="136" dy="13">1</tspan><tspan x="136" dy="13">M</tspan><tspan x="136" dy="13">S</tspan><tspan x="136" dy="13">0</tspan><tspan x="136" dy="13">1</tspan><tspan x="136" dy="13">0</tspan><tspan x="136" dy="13">1</tspan></text>
    <text class="col" x="154" style="animation-duration:3.3s;animation-delay:2.6s">G<tspan x="154" dy="13">I</tspan><tspan x="154" dy="13">N</tspan><tspan x="154" dy="13">0</tspan><tspan x="154" dy="13">1</tspan><tspan x="154" dy="13">G</tspan><tspan x="154" dy="13">I</tspan><tspan x="154" dy="13">N</tspan><tspan x="154" dy="13">0</tspan><tspan x="154" dy="13">1</tspan><tspan x="154" dy="13">G</tspan><tspan x="154" dy="13">I</tspan><tspan x="154" dy="13">N</tspan><tspan x="154" dy="13">0</tspan><tspan x="154" dy="13">1</tspan><tspan x="154" dy="13">0</tspan></text>
