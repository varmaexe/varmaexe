    <text class="col" x="82"  style="animation-duration:3.1s;animation-delay:2.0s">C<tspan x="82"  dy="13">T</tspan><tspan x="82"  dy="13">E</tspan><tspan x="82"  dy="13">0</tspan><tspan x="82"  dy="13">1</tspan><tspan x="82"  dy="13">C</tspan><tspan x="82"  dy="13">T</tspan><tspan x="82"  dy="13">E</tspan><tspan x="82"  dy="13">0</tspan><tspan x="82"  dy="13">1</tspan><tspan x="82"  dy="13">C</tspan><tspan x="82"  dy="13">T</tspan><tspan x="82"  dy="13">E</tspan><tspan x="82"  dy="13">0</tspan><tspan x="82"  dy="13">1</tspan><tspan x="82"  dy="13">0</tspan></text>
