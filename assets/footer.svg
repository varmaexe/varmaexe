<svg width="900" height="72" viewBox="0 0 900 72" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes glow-text {
        0%, 100% { fill: #a78bfa; filter: drop-shadow(0 0 4px #6d28d9); }
        50%       { fill: #ede9fe; filter: drop-shadow(0 0 10px #7c3aed); }
      }
      .tag {
        font-family: 'Courier New', Courier, monospace;
        font-size: 12px;
        letter-spacing: 3px;
        text-anchor: middle;
        animation: glow-text 4s ease-in-out infinite;
      }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0a0010"/>
      <stop offset="50%"  stop-color="#0d0018"/>
      <stop offset="100%" stop-color="#0a0010"/>
    </linearGradient>
  </defs>

  <rect width="900" height="72" fill="url(#bg)"/>
  <rect x="0" y="0"  width="900" height="2" fill="#7c3aed" opacity="0.7"/>
  <rect x="0" y="70" width="900" height="2" fill="#7c3aed" opacity="0.3"/>

  <text class="tag" x="450" y="43" fill="#a78bfa">
    ⚡  built with Go  ·  shipped with intent  ·  optimized to the bone  ⚡
  </text>
</svg>
